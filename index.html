<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#f27d26" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/rocket.png" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/rocket.png" />
    <title>GraviPrompt - Otimizador de Prompts</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      (function() {
        // 1. Theme logic
        try {
          const savedTheme = localStorage.getItem('graviprompt-theme');
          if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}

        // 2. Aggressive Auto-Reload Logic
        function forceFreshReload() {
          const now = Date.now();
          const lastReload = sessionStorage.getItem('last-force-reload');
          
          // Prevent infinite reload loops (max 1 reload every 10 seconds)
          if (!lastReload || (now - parseInt(lastReload)) > 10000) {
            sessionStorage.setItem('last-force-reload', now.toString());
            console.warn('Stale assets detected. Forcing fresh reload...');
            
            // Add a timestamp to the URL to bypass browser/CDN cache
            const url = new URL(window.location.href);
            url.searchParams.set('v', now.toString());
            window.location.replace(url.toString());
          }
        }

        // Catch 404s on scripts/css immediately
        window.addEventListener('error', function(e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            forceFreshReload();
          }
        }, true);

        // 3. White Screen Detection (Fallback)
        // If the app hasn't rendered anything after 3.5 seconds, something is wrong
        window.addEventListener('load', function() {
          setTimeout(function() {
            const root = document.getElementById('root');
            if (root && root.childNodes.length === 0) {
              forceFreshReload();
            }
          }, 3500);
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

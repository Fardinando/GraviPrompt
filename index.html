<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#f27d26" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/rocket.png" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/rocket.png" />
    <title>GraviPrompt - Otimizador de Prompts</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('graviprompt-theme');
          if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}

        // Global Error Handler for Asset Loading (404s on JS/CSS)
        window.addEventListener('error', function(e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            const url = e.target.src || e.target.href;
            if (url && (url.includes('.js') || url.includes('.css'))) {
              console.warn('Asset failed to load, likely due to a new version. Reloading...', url);
              // Only reload if we haven't reloaded in the last 10 seconds to avoid loops
              const lastReload = sessionStorage.getItem('last-error-reload');
              const now = Date.now();
              if (!lastReload || (now - parseInt(lastReload)) > 10000) {
                sessionStorage.setItem('last-error-reload', now.toString());
                window.location.reload();
              }
            }
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
